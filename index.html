<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naina's Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --surface2: #161616;
  --surface3: #1e1e1e;
  --border: #1c1c1c;
  --border2: #262626;
  --text: #f0f0f0;
  --muted: #444;
  --muted2: #666;
  --yellow: #f5c518;
  --yellow-dim: rgba(245,197,24,0.12);
  --pink: #ff6eb4;
  --pink-dim: rgba(255,110,180,0.12);
  --purple: #b06cff;
  --purple-dim: rgba(176,108,255,0.12);
  --green: #2ecc71;
  --green-dim: rgba(46,204,113,0.12);
  --red: #ff4757;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  padding: 18px 32px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
}
.header-left { display: flex; align-items: baseline; gap: 16px; }
.header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.header-title span { color: var(--yellow); }
.header-month { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 2px; }
.header-stats { display: flex; gap: 20px; align-items: center; }
.stat-pill { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.stat-pill-val { font-size: 17px; font-weight: 800; font-family: 'DM Mono', monospace; }
.stat-pill-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted2); font-family: 'DM Mono', monospace; }
.month-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  background: var(--surface2); border: 1px solid var(--border2); color: var(--muted2);
  width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.nav-btn:hover { color: var(--text); border-color: #444; }
.save-btn {
  background: var(--yellow); border: none; color: #000;
  padding: 8px 16px; border-radius: 7px; cursor: pointer;
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; transition: background 0.15s;
}
.save-btn:hover { background: #e8bb00; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  background: var(--bg);
  position: sticky;
  top: 65px;
  z-index: 49;
}
.tab-btn {
  padding: 12px 20px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted2);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }
.tab-icon { font-size: 15px; }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: flex; flex-direction: column; }

/* ── GRID PAGE ── */
#page-grid { flex-direction: row; height: calc(100vh - 113px); }
.sidebar {
  width: 220px; min-width: 220px;
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 16px 0;
  height: 100%;
}
.sidebar-section { padding: 0 16px; margin-bottom: 20px; }
.sidebar-label { font-size: 9px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
.habit-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.habit-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.habit-name-input {
  flex: 1; background: none; border: none; color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 12px; outline: none; cursor: text; min-width: 0;
}
.habit-name-input::placeholder { color: var(--muted); }
.habit-name-input:focus { background: var(--surface2); border-radius: 4px; padding: 2px 4px; }
.habit-streak { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--yellow); flex-shrink: 0; }
.progress-item { margin-bottom: 10px; }
.progress-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.progress-label { font-size: 11px; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
.progress-pct { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text); }
.progress-bar-bg { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.main { flex: 1; overflow: auto; }
.grid-wrapper { min-width: max-content; }
.date-header-row { display: flex; position: sticky; top: 0; background: var(--bg); z-index: 20; border-bottom: 1px solid var(--border); }
.date-header-spacer { width: 0; flex-shrink: 0; }
.date-cell-header {
  width: 52px; min-width: 52px; padding: 12px 4px 8px;
  text-align: center; border-right: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
.date-cell-header:hover { background: var(--surface2); }
.date-cell-header.today { background: var(--yellow-dim); }
.date-cell-header.today .date-num { color: var(--yellow); }
.date-cell-header.selected { background: var(--purple-dim); }
.date-num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); display: block; margin-bottom: 2px; }
.date-day { font-size: 9px; color: var(--muted2); text-transform: uppercase; letter-spacing: 1px; font-family: 'DM Mono', monospace; }
.date-todo-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--pink); margin: 3px auto 0; opacity: 0; }
.date-todo-dot.has-todo { opacity: 1; }
.habit-check-cell {
  width: 52px; min-width: 52px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid var(--border); cursor: pointer;
  transition: background 0.12s;
}
.habit-check-cell:hover { background: var(--surface2); }
.check-box {
  width: 20px; height: 20px; border: 1.5px solid var(--border2); border-radius: 5px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 11px;
}
.habit-row { display: flex; border-bottom: 1px solid var(--border); }
.stats-row { display: flex; border-top: 2px solid var(--border2); background: var(--surface); position: sticky; bottom: 0; }
.stats-cell { width: 52px; min-width: 52px; padding: 8px 4px; text-align: center; border-right: 1px solid var(--border); }
.stats-cell-count { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
.stats-cell-pct { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); }

/* ── TODO PANEL ── */
.todo-panel {
  position: fixed; right: 0; top: 113px;
  width: 320px; height: calc(100vh - 113px);
  background: var(--surface); border-left: 1px solid var(--border2);
  transform: translateX(100%); transition: transform 0.25s ease;
  z-index: 40; display: flex; flex-direction: column;
}
.todo-panel.open { transform: translateX(0); }
.todo-panel-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.todo-date-label { font-size: 16px; font-weight: 700; }
.todo-date-sub { font-size: 11px; color: var(--muted2); font-family: 'DM Mono', monospace; margin-top: 2px; }
.todo-close { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted2); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.todo-close:hover { color: var(--text); }
.todo-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
.todo-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.todo-checkbox { width: 18px; height: 18px; border: 1.5px solid var(--border2); border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 10px; transition: all 0.12s; }
.todo-checkbox.checked { background: var(--green); border-color: var(--green); color: #000; }
.todo-text { flex: 1; font-size: 13px; background: none; border: none; color: var(--text); font-family: 'Syne', sans-serif; outline: none; }
.todo-text.done { text-decoration: line-through; color: var(--muted2); }
.todo-text::placeholder { color: var(--muted); }
.todo-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 3px; opacity: 0; transition: opacity 0.12s; }
.todo-item:hover .todo-del { opacity: 1; }
.todo-del:hover { color: var(--red); }
.todo-add-row { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.todo-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; }
.todo-input:focus { border-color: var(--pink); }
.todo-input::placeholder { color: var(--muted); }
.todo-add-btn { background: var(--pink); border: none; color: #000; padding: 9px 14px; border-radius: 8px; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; transition: background 0.15s; }
.todo-add-btn:hover { background: #ff85c0; }

/* ── GARDEN PAGE ── */
#page-garden {
  padding: 32px;
  min-height: calc(100vh - 113px);
  background: radial-gradient(ellipse at 50% 100%, rgba(46,204,113,0.04) 0%, transparent 70%);
}
.garden-title {
  text-align: center;
  margin-bottom: 8px;
}
.garden-title h2 {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #2ecc71, #a8e063);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.garden-title p {
  font-size: 12px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  margin-top: 4px;
}
.garden-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
  max-width: 900px;
  margin: 32px auto 0;
}

.garden-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 20px 16px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: visible;
}
.garden-card:hover { border-color: #333; transform: translateY(-2px); }
.garden-card.thriving { border-color: rgba(46,204,113,0.3); background: rgba(46,204,113,0.04); }
.garden-card.okay { border-color: rgba(245,197,24,0.2); background: rgba(245,197,24,0.03); }
.garden-card.struggling { border-color: rgba(255,71,87,0.25); background: rgba(255,71,87,0.04); }

/* Thought bubble */
.thought-bubble {
  position: absolute;
  top: -70px;
  left: 50%;
  transform: translateX(-50%) scale(0);
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  max-width: 200px;
  white-space: normal;
  text-align: center;
  line-height: 1.4;
}
.thought-bubble::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 8px; height: 8px;
  background: var(--surface3);
  border-right: 1px solid var(--border2);
  border-bottom: 1px solid var(--border2);
  transform: translateX(-50%) rotate(45deg);
}
.garden-card:hover .thought-bubble { transform: translateX(-50%) scale(1); }

.creature-display {
  font-size: 42px;
  line-height: 1;
  margin-bottom: 6px;
  transition: all 0.3s;
  display: block;
  text-align: center;
}
.garden-card.struggling .creature-display {
  filter: grayscale(0.4) brightness(0.8);
  animation: wobble 2s ease-in-out infinite;
}
.garden-card.thriving .creature-display {
  animation: bounce-happy 2s ease-in-out infinite;
}

@keyframes wobble {
  0%,100% { transform: rotate(0deg); }
  25% { transform: rotate(-5deg); }
  75% { transform: rotate(5deg); }
}
@keyframes bounce-happy {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.flower-display {
  font-size: 28px;
  line-height: 1;
  margin-bottom: 10px;
  transition: all 0.3s;
  display: block;
  text-align: center;
}
.garden-card.struggling .flower-display {
  filter: grayscale(0.6) brightness(0.7);
  transform: rotate(-15deg);
}

.habit-label {
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  color: var(--text);
  margin-bottom: 4px;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}

.health-bar-wrap {
  width: 100%;
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.health-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.health-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted2);
  text-align: center;
}

/* Garden detail modal */
.garden-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  backdrop-filter: blur(4px);
}
.garden-modal-overlay.open { opacity: 1; pointer-events: all; }
.garden-modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 32px;
  width: 380px;
  max-width: 90vw;
  transform: scale(0.9);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
.garden-modal-overlay.open .garden-modal { transform: scale(1); }
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--surface2); border: 1px solid var(--border2); color: var(--muted2);
  width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--text); }
.modal-creatures { font-size: 64px; text-align: center; margin-bottom: 16px; }
.modal-habit-name { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.modal-status {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  margin-bottom: 20px;
  padding: 4px 12px;
  border-radius: 20px;
  display: inline-block;
  width: 100%;
}
.modal-status.thriving { color: var(--green); background: var(--green-dim); }
.modal-status.okay { color: var(--yellow); background: var(--yellow-dim); }
.modal-status.struggling { color: var(--red); background: rgba(255,71,87,0.12); }
.modal-stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.modal-stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
}
.modal-stat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
.modal-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted2); font-family: 'DM Mono', monospace; margin-top: 2px; }
.modal-quote {
  background: var(--surface2);
  border-left: 3px solid var(--pink);
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  font-size: 13px;
  font-style: italic;
  color: var(--text);
  line-height: 1.5;
}

/* ── ANALYTICS PAGE ── */
#page-analytics {
  padding: 32px;
  min-height: calc(100vh - 113px);
}
.analytics-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}
.analytics-title { font-size: 24px; font-weight: 800; }
.analytics-controls { display: flex; gap: 12px; align-items: center; }
.habit-select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 9px 14px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  outline: none;
  cursor: pointer;
  min-width: 160px;
}
.habit-select:focus { border-color: var(--yellow); }

.analytics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
.analytics-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 20px 24px;
}
.analytics-card-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted2);
  margin-bottom: 8px;
}
.analytics-card-val { font-size: 32px; font-weight: 800; font-family: 'DM Mono', monospace; }

.chart-container {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 24px;
}
.chart-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 120px;
}
.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  height: 100%;
  justify-content: flex-end;
}
.bar-fill {
  width: 100%;
  border-radius: 3px 3px 0 0;
  transition: height 0.5s ease;
  min-height: 2px;
}
.bar-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: var(--muted2);
  text-align: center;
}

.heatmap-container {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 24px;
}
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-top: 12px;
}
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  color: var(--muted2);
  transition: background 0.3s;
}
.heatmap-day-label {
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  text-align: center;
  padding: 4px 0 8px;
}

/* ── MISC ── */
.save-indicator {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 16px;
  font-size: 12px; font-family: 'DM Mono', monospace; color: var(--green);
  transition: transform 0.3s ease; z-index: 100;
}
.save-indicator.show { transform: translateX(-50%) translateY(0); }
.loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; gap: 12px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted2); }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div> Loading your tracker...
</div>

<div id="app" style="display:none">

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-title">Naina's <span>Habit Tracker</span></div>
    <div class="header-month" id="headerMonth"></div>
  </div>
  <div class="header-stats">
    <div class="stat-pill">
      <div class="stat-pill-val" id="statOverall" style="color:var(--yellow)">0%</div>
      <div class="stat-pill-label">This Month</div>
    </div>
    <div class="stat-pill">

<script>
// ── CONFIG ──
const AW = {
  url: 'https://sgp.cloud.appwrite.io/v1',
  project: '69a7448a002fc5074132',
  db: '69a74521003636c06877',
  col: 'habit_tracker'
};
const DOC_ID = 'main_data';

const HABIT_COLORS = [
  '#f5c518','#ff6eb4','#b06cff','#2ecc71',
  '#ff8c42','#00d4d4','#ff4757','#a8e063',
  '#ffd32a','#c56cf0'
];

// Cottagecore pairs
const GARDEN_PAIRS = [
  { animal: '🐰', flower: '🌹', name: 'Bunny & Rose' },
  { animal: '🦊', flower: '🌻', name: 'Fox & Sunflower' },
  { animal: '🦌', flower: '💐', name: 'Deer & Lavender' },
  { animal: '🦔', flower: '🌼', name: 'Hedgehog & Daisy' },
  { animal: '🦉', flower: '🌷', name: 'Owl & Tulip' },
  { animal: '🐱', flower: '🌸', name: 'Cat & Peony' },
  { animal: '🐸', flower: '🌺', name: 'Frog & Lily' },
  { animal: '🐭', flower: '🩵', name: 'Mouse & Forget-me-not' },
  { animal: '🦆', flower: '🔴', name: 'Duck & Poppy' },
  { animal: '🦋', flower: '🌸', name: 'Butterfly & Cherry Blossom' },
];

// Unhinged toxic motivation quotes, keyed by status
const TOXIC_QUOTES = {
  thriving: [
    "ok fine, i'm not NOT impressed. barely.",
    "this is the bare minimum but sure, slay.",
    "you're doing it!! don't ruin it like last time.",
    "colour me shocked. you actually showed up.",
    "even your ancestors are cautiously optimistic.",
    "doing great! don't let it go to your head.",
  ],
  okay: [
    "mediocrity called. it wants its vibe back.",
    "50% is a fail in most schools just saying.",
    "you're coasting and we both know it.",
    "this is giving 'trying but only when convenient'.",
    "your plant is holding on. barely. like you.",
    "C+ energy. you can do worse but also SO much better.",
  ],
  struggling: [
    "I'm not mad. I'm just deeply, deeply disappointed. 🙂",
    "even your plant gave up. it's now a cautionary tale.",
    "your ancestors did NOT survive for this.",
    "day 0. embarrassing doesn't even cover it.",
    "are you SERIOUS right now???",
    "bestie. BESTIE. what are we doing.",
    "the audacity to open this app and not check the box.",
    "this habit is in its villain era. because of YOU.",
    "your future self is looking back at this and crying.",
    "the bar was on the floor and you still tripped.",
  ]
};

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let habits = Array.from({length:10}, (_,i) => `Habit ${i+1}`);
let completions = {};
let todos = {};
let selectedDate = null;
let saveTimer = null;
let currentTab = 'grid';

// ── DATA ──
async function loadData() {
  try {
    const res = await fetch(`${AW.url}/databases/${AW.db}/collections/${AW.col}/documents/${DOC_ID}`, {
      headers: { 'X-Appwrite-Project': AW.project }
    });
    if (res.ok) {
      const doc = await res.json();
      if (doc.habits) habits = JSON.parse(doc.habits);
      if (doc.completions) completions = JSON.parse(doc.completions);
      if (doc.todos) todos = JSON.parse(doc.todos);
    }
  } catch(e) { console.log('Load:', e); }
  init();
}

async function saveAll() {
  const body = {
    data: {
      habits: JSON.stringify(habits),
      completions: JSON.stringify(completions),
      todos: JSON.stringify(todos)
    }
  };
  try {
    let res = await fetch(`${AW.url}/databases/${AW.db}/collections/${AW.col}/documents/${DOC_ID}`, {
      method: 'PATCH',
      headers: { 'X-Appwrite-Project': AW.project, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.status === 404) {
      await fetch(`${AW.url}/databases/${AW.db}/collections/${AW.col}/documents`, {
        method: 'POST',
        headers: { 'X-Appwrite-Project': AW.project, 'Content-Type': 'application/json' },
        body: JSON.stringify({ documentId: DOC_ID, ...body })
      });
    }
    showSaved();
  } catch(e) { console.error('Save error:', e); }
}

function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAll, 1500);
}

function showSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── INIT ──
function init() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  populateAnalyticsSelect();
  render();
}

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}
function dateKey(year, month, day) {
  return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}
function checkKey(dateStr, habitIdx) {
  return `${dateStr}_${habitIdx}`;
}

function render() {
  document.getElementById('headerMonth').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  renderSidebar();
  renderGrid();
  renderStats();
  if (currentTab === 'garden') renderGarden();
  if (currentTab === 'analytics') renderAnalytics();
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  if (tab === 'garden') renderGarden();
  if (tab === 'analytics') renderAnalytics();
}

// ── SIDEBAR ──
function renderSidebar() {
  const daysInMonth = getDaysInMonth(currentYear, currentMonth);
  document.getElementById('habitList').innerHTML = habits.map((h, i) => {
    const streak = calcStreak(i);
    return `<div class="habit-item">
      <div class="habit-color-dot" style="background:${HABIT_COLORS[i]}"></div>
      <input class="habit-name-input" value="${h}" placeholder="Habit ${i+1}"
        onchange="habits[${i}]=this.value;autoSave();renderSidebar();populateAnalyticsSelect();"
        oninput="habits[${i}]=this.value" />
      ${streak > 0 ? `<span class="habit-streak">${streak}🔥</span>` : ''}
    </div>`;
  }).join('');

  document.getElementById('progressList').innerHTML = habits.map((h, i) => {
    let done = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      if (completions[checkKey(dateKey(currentYear, currentMonth, d), i)]) done++;
    }
    const pct = Math.round((done / daysInMonth) * 100);
    return `<div class="progress-item">
      <div class="progress-label-row">
        <span class="progress-label">${h}</span>
        <span class="progress-pct">${pct}%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%;background:${HABIT_COLORS[i]}"></div>
      </div>
    </div>`;
  }).join('');
}

// ── GRID ──
function renderGrid() {
  const wrapper = document.getElementById('gridWrapper');
  const daysInMonth = getDaysInMonth(currentYear, currentMonth);
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === currentYear && today.getMonth() === currentMonth;
  const todayDate = today.getDate();

  let dateHeaders = '<div class="date-header-row"><div class="date-header-spacer"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = dateKey(currentYear, currentMonth, d);
    const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
    const isToday = isCurrentMonth && d === todayDate;
    const isSel = selectedDate === dk;
    const hasTodo = todos[dk] && todos[dk].length > 0;
    dateHeaders += `<div class="date-cell-header ${isToday?'today':''} ${isSel?'selected':''}" onclick="openTodo('${dk}',${d})">
      <span class="date-num">${d}</span>
      <span class="date-day">${DAYS[dayOfWeek]}</span>
      <div class="date-todo-dot ${hasTodo?'has-todo':''}"></div>
    </div>`;
  }
  dateHeaders += '</div>';

  let rows = '<div class="habit-rows">';
  habits.forEach((h, hi) => {
    const color = HABIT_COLORS[hi];
    rows += `<div class="habit-row"><div style="display:flex">`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dk = dateKey(currentYear, currentMonth, d);
      const ck = checkKey(dk, hi);
      const checked = !!completions[ck];
      rows += `<div class="habit-check-cell ${checked?'checked':''}"
        onclick="toggleCheck('${dk}',${hi},this)"
        style="${checked ? `background:${color}20` : ''}">
        <div class="check-box" style="${checked ? `background:${color};border-color:${color}` : ''}">
          ${checked ? '✓' : ''}
        </div>
      </div>`;
    }
    rows += '</div></div>';
  });
  rows += '</div>';

  let statsRow = '<div class="stats-row"><div style="width:0;flex-shrink:0"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = dateKey(currentYear, currentMonth, d);
    let done = 0;
    habits.forEach((_, hi) => { if (completions[checkKey(dk, hi)]) done++; });
    const pct = Math.round((done / habits.length) * 100);
    const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : pct > 0 ? 'var(--pink)' : 'var(--muted)';
    statsRow += `<div class="stats-cell">
      <div class="stats-cell-count" style="color:${color}">${done}</div>
      <div class="stats-cell-pct">${pct}%</div>
    </div>`;
  }
  statsRow += '</div>';

  wrapper.innerHTML = dateHeaders + rows + statsRow;
}

// ── STREAK / STATS ──
function calcStreak(habitIdx) {
  let streak = 0;
  let d = new Date();
  while (true) {
    const dk = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (completions[checkKey(dk, habitIdx)]) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcHabitProgress(habitIdx, year, month) {
  year = year || currentYear;
  month = month !== undefined ? month : currentMonth;
  const dim = getDaysInMonth(year, month);
  let done = 0;
  for (let d = 1; d <= dim; d++) {
    if (completions[checkKey(dateKey(year, month, d), habitIdx)]) done++;
  }
  return Math.round((done / dim) * 100);
}

function calcBestStreakForHabit(habitIdx) {
  const dim = getDaysInMonth(currentYear, currentMonth);
  let best = 0, current = 0;
  for (let d = 1; d <= dim; d++) {
    const dk = dateKey(currentYear, currentMonth, d);
    if (completions[checkKey(dk, habitIdx)]) { current++; if (current > best) best = current; }
    else current = 0;
  }
  return best;
}

function calcHabitHealth(habitIdx) {
  const monthly = calcHabitProgress(habitIdx);
  const streak = calcStreak(habitIdx);
  // Mix: 70% monthly, 30% streak bonus (streak up to 30 days)
  const streakBonus = Math.min(streak / 30, 1) * 100;
  return Math.round(monthly * 0.7 + streakBonus * 0.3);
}

function renderStats() {
  let total = 0;
  habits.forEach((_, hi) => { total += calcHabitProgress(hi); });
  const avgPct = Math.round(total / habits.length);
  document.getElementById('statOverall').textContent = avgPct + '%';

  let topIdx = 0, topPct = 0;
  habits.forEach((_, hi) => {
    const p = calcHabitProgress(hi);
    if (p > topPct) { topPct = p; topIdx = hi; }
  });
  const topName = habits[topIdx];
  document.getElementById('statDone').textContent = topName.length > 8 ? topName.substring(0,8)+'…' : topName;

  let bestStreak = 0;
  habits.forEach((_, hi) => {
    const s = calcBestStreakForHabit(hi);
    if (s > bestStreak) bestStreak = s;
  });
  document.getElementById('statStreak').textContent = bestStreak;
}

// ── TOGGLE CHECK ──
function toggleCheck(dateStr, habitIdx, cell) {
  const ck = checkKey(dateStr, habitIdx);
  const color = HABIT_COLORS[habitIdx];
  if (completions[ck]) {
    delete completions[ck];
    cell.classList.remove('checked');
    cell.style.background = '';
    cell.querySelector('.check-box').style.cssText = '';
    cell.querySelector('.check-box').textContent = '';
  } else {
    completions[ck] = true;
    cell.classList.add('checked');
    cell.style.background = `${color}20`;
    cell.querySelector('.check-box').style.cssText = `background:${color};border-color:${color}`;
    cell.querySelector('.check-box').textContent = '✓';
  }
  renderSidebar();
  renderStats();
  renderGrid();
  autoSave();
}

// ── TODO ──
function openTodo(dateStr, dayNum) {
  selectedDate = dateStr;
  const d = new Date(currentYear, currentMonth, dayNum);
  document.getElementById('todoPanelDate').textContent = `${DAYS[d.getDay()]}, ${MONTHS[currentMonth]} ${dayNum}`;
  document.getElementById('todoPanel').classList.add('open');
  renderTodoList();
  renderGrid();
}
function closeTodo() {
  document.getElementById('todoPanel').classList.remove('open');
  selectedDate = null;
  renderGrid();
}
function renderTodoList() {
  if (!selectedDate) return;
  const list = todos[selectedDate] || [];
  const container = document.getElementById('todoList');
  container.innerHTML = list.length === 0
    ? `<div style="color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;text-align:center;padding:20px">No to-dos yet</div>`
    : list.map((t, i) => `
      <div class="todo-item">
        <div class="todo-checkbox ${t.done?'checked':''}" onclick="toggleTodo(${i})">${t.done?'✓':''}</div>
        <input class="todo-text ${t.done?'done':''}" value="${t.text}" onchange="updateTodoText(${i},this.value)" placeholder="To-do..." />
        <button class="todo-del" onclick="deleteTodo(${i})">✕</button>
      </div>`).join('');
}
function addTodo() {
  if (!selectedDate) return;
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  if (!todos[selectedDate]) todos[selectedDate] = [];
  todos[selectedDate].push({ text, done: false });
  input.value = '';
  renderTodoList();
  renderGrid();
  autoSave();
}
function toggleTodo(idx) {
  if (!selectedDate || !todos[selectedDate]) return;
  todos[selectedDate][idx].done = !todos[selectedDate][idx].done;
  renderTodoList();
  autoSave();
}
function updateTodoText(idx, text) {
  if (!selectedDate || !todos[selectedDate]) return;
  todos[selectedDate][idx].text = text;
  autoSave();
}
function deleteTodo(idx) {
  if (!selectedDate || !todos[selectedDate]) return;
  todos[selectedDate].splice(idx, 1);
  renderTodoList();
  renderGrid();
  autoSave();
}

// ── MONTH NAV ──
function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  closeTodo();
  render();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  closeTodo();
  render();
}

// ── GARDEN ──
function getHealthStatus(health) {
  if (health >= 65) return 'thriving';
  if (health >= 35) return 'okay';
  return 'struggling';
}

function getRandomQuote(status) {
  const arr = TOXIC_QUOTES[status];
  return arr[Math.floor(Math.random() * arr.length)];
}

function renderGarden() {
  const grid = document.getElementById('gardenGrid');
  grid.innerHTML = habits.map((h, i) => {
    const pair = GARDEN_PAIRS[i];
    const health = calcHabitHealth(i);
    const status = getHealthStatus(health);
    const quote = getRandomQuote(status);
    const pct = calcHabitProgress(i);
    const streak = calcStreak(i);

    // Flower display: wilting if struggling
    const flowerDisplay = status === 'struggling'
      ? pair.flower
      : status === 'okay'
        ? pair.flower
        : pair.flower;

    const healthColor = status === 'thriving' ? 'var(--green)' : status === 'okay' ? 'var(--yellow)' : 'var(--red)';
    const statusEmoji = status === 'thriving' ? '✨' : status === 'okay' ? '😐' : '💀';

    return `<div class="garden-card ${status}" onclick="openGardenModal(${i})" style="border-color:${status==='thriving'?'rgba(46,204,113,0.3)':status==='okay'?'rgba(245,197,24,0.2)':'rgba(255,71,87,0.25)'}">
      <div class="thought-bubble">${quote}</div>
      <span class="flower-display">${flowerDisplay}</span>
      <span class="creature-display">${pair.animal}</span>
      <div class="habit-label" title="${h}">${h}</div>
      <div class="health-bar-wrap">
        <div class="health-bar-fill" style="width:${health}%;background:${healthColor}"></div>
      </div>
      <div class="health-label">${health}% health ${statusEmoji}</div>
    </div>`;
  }).join('');
}

function openGardenModal(habitIdx) {
  const pair = GARDEN_PAIRS[habitIdx];
  const health = calcHabitHealth(habitIdx);
  const status = getHealthStatus(health);
  const pct = calcHabitProgress(habitIdx);
  const streak = calcStreak(habitIdx);
  const bestStreak = calcBestStreakForHabit(habitIdx);
  const color = HABIT_COLORS[habitIdx];

  document.getElementById('modalCreatures').textContent = `${pair.flower} ${pair.animal} ${pair.flower}`;
  document.getElementById('modalHabitName').textContent = habits[habitIdx];

  const statusEl = document.getElementById('modalStatus');
  const statusText = status === 'thriving' ? '✨ Thriving!' : status === 'okay' ? '😐 Getting by...' : '💀 Struggling badly';
  statusEl.textContent = statusText;
  statusEl.className = `modal-status ${status}`;

  const healthColor = status === 'thriving' ? 'var(--green)' : status === 'okay' ? 'var(--yellow)' : 'var(--red)';
  document.getElementById('modalStatsGrid').innerHTML = `
    <div class="modal-stat">
      <div class="modal-stat-val" style="color:${healthColor}">${health}%</div>
      <div class="modal-stat-label">Health</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val" style="color:var(--yellow)">${streak}</div>
      <div class="modal-stat-label">Streak 🔥</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-val" style="color:${color}">${pct}%</div>
      <div class="modal-stat-label">This Month</div>
    </div>
  `;

  // Pick a full dramatic quote for modal
  const quotes = TOXIC_QUOTES[status];
  const quote = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('modalQuote').textContent = `"${quote}"`;

  document.getElementById('gardenModalOverlay').classList.add('open');
}

function closeGardenModal(e) {
  if (e.target === document.getElementById('gardenModalOverlay')) {
    document.getElementById('gardenModalOverlay').classList.remove('open');
  }
}
function closeGardenModalBtn() {
  document.getElementById('gardenModalOverlay').classList.remove('open');
}

// ── ANALYTICS ──
function populateAnalyticsSelect() {
  const sel = document.getElementById('analyticsHabitSelect');
  const val = sel.value;
  sel.innerHTML = habits.map((h, i) => `<option value="${i}">${h}</option>`).join('');
  if (val !== '' && parseInt(val) < habits.length) sel.value = val;
}

function renderAnalytics() {
  const sel = document.getElementById('analyticsHabitSelect');
  const hi = parseInt(sel.value) || 0;
  const color = HABIT_COLORS[hi];
  const daysInMonth = getDaysInMonth(currentYear, currentMonth);
  const pct = calcHabitProgress(hi);
  const streak = calcStreak(hi);
  const bestStreak = calcBestStreakForHabit(hi);

  // Count done days
  let doneDays = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    if (completions[checkKey(dateKey(currentYear, currentMonth, d), hi)]) doneDays++;
  }

  // Stats cards
  document.getElementById('analyticsStatsGrid').innerHTML = `
    <div class="analytics-card">
      <div class="analytics-card-label">Monthly Completion</div>
      <div class="analytics-card-val" style="color:${color}">${pct}%</div>
    </div>
    <div class="analytics-card">
      <div class="analytics-card-label">Days Completed</div>
      <div class="analytics-card-val" style="color:var(--green)">${doneDays} / ${daysInMonth}</div>
    </div>
    <div class="analytics-card">
      <div class="analytics-card-label">Current Streak 🔥</div>
      <div class="analytics-card-val" style="color:var(--yellow)">${streak}</div>
    </div>
    <div class="analytics-card">
      <div class="analytics-card-label">Best Streak This Month</div>
      <div class="analytics-card-val" style="color:var(--pink)">${bestStreak}</div>
    </div>
  `;

  // Bar chart
  const barChart = document.getElementById('analyticsBarChart');
  let bars = '';
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = dateKey(currentYear, currentMonth, d);
    const done = !!completions[checkKey(dk, hi)];
    const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
    const isToday = new Date().getFullYear() === currentYear && new Date().getMonth() === currentMonth && d === new Date().getDate();
    bars += `<div class="bar-col">
      <div class="bar-fill" style="height:${done ? 100 : 8}%;background:${done ? color : 'var(--surface3)'};opacity:${isToday ? 1 : 0.85}"></div>
      <div class="bar-label" style="color:${isToday?color:'var(--muted2)'}">${d}</div>
    </div>`;
  }
  barChart.innerHTML = bars;

  // Heatmap — show days of week header + cells
  const heatmap = document.getElementById('analyticsHeatmap');
  let heatHTML = ['S','M','T','W','T','F','S'].map(d => `<div class="heatmap-day-label">${d}</div>`).join('');

  // Pad for first day of month
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  for (let i = 0; i < firstDay; i++) {
    heatHTML += `<div class="heatmap-cell" style="background:transparent"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dk = dateKey(currentYear, currentMonth, d);
    const done = !!completions[checkKey(dk, hi)];
    const isToday = new Date().getFullYear() === currentYear && new Date().getMonth() === currentMonth && d === new Date().getDate();
    heatHTML += `<div class="heatmap-cell" style="background:${done ? color + 'cc' : 'var(--surface3)'};${isToday ? `box-shadow:0 0 0 2px ${color}` : ''}" title="Day ${d}: ${done ? '✓' : '✗'}">${d}</div>`;
  }
  heatmap.innerHTML = heatHTML;
}

loadData();
</script>
</body>
</html>
